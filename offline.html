<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline | Crypto Calendar</title>
  <meta name="theme-color" content="#07101b" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Space Grotesk", sans-serif;
      color: #f4f7fb;
      background:
        radial-gradient(circle at top right, rgba(247, 185, 85, 0.12), transparent 28%),
        radial-gradient(circle at bottom left, rgba(125, 196, 255, 0.14), transparent 30%),
        linear-gradient(180deg, #050a12, #07101b 45%, #0a1830);
    }
    .offline-card {
      width: min(520px, 100%);
      padding: 32px;
      border: 1px solid rgba(165, 193, 224, 0.14);
      border-radius: 28px;
      background: rgba(11, 22, 37, 0.92);
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.32);
    }
    h1 { margin: 0 0 12px; font-size: 2.2rem; }
    p { margin: 0 0 12px; color: #9eb2ca; line-height: 1.65; }
    .button {
      display: inline-flex;
      margin-top: 8px;
      padding: 12px 18px;
      border-radius: 14px;
      border: 0;
      color: #0a111f;
      background: linear-gradient(135deg, #f7b955, #ffd899);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <section class="offline-card">
    <h1>You are offline</h1>
    <p>The app shell is installed, but live sync, AI review, and fresh market data need an internet connection.</p>
    <p>When you reconnect, open the app again and everything will continue from your saved workspace.</p>
    <a class="button" href="/">Try Again</a>
  </section>
</body>
</html>
